apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: easybus-gateway
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/e-abdelilah/EasyBus.git
    targetRevision: HEAD
    path: k8s-manifests/easybus-gateway
  destination:
    server: https://kubernetes.default.svc
    namespace: easybus-gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true