apiVersion: apps/v1
kind: Deployment
metadata:
  name: security-service
  namespace: easybus-services
spec:
  replicas: 2
  selector:
    matchLabels:
      app: security-service
  template:
    metadata:
      labels:
        app: security-service
    spec:
      containers:
      - name: security-service
        image: abdelilahxr/security-service:latest
        ports:
        - containerPort: 8084
        envFrom:
        - configMapRef:
            name: security-config
        env:
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: security-secret
              key: DB_PASSWORD