apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: easybus-services
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
      - name: payment-service
        image: abdelilahxr/payment-service:latest
        ports:
        - containerPort: 8083
        envFrom:
        - configMapRef:
            name: payment-config
        env:
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: payment-secret
              key: DB_PASSWORD