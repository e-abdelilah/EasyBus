apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: easybus-services
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: >
      member=abdelilahxr/member-service,
      security=abdelilahxr/security-service,
      payment=abdelilahxr/payment-service,
      expedition=abdelilahxr/expedition-service
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: master
spec:
  project: default
  source:
    repoURL: https://github.com/e-abdelilah/EasyBus.git
    targetRevision: HEAD
    path: k8s-manifests/easybus-services
  destination:
    server: https://kubernetes.default.svc
    namespace: easybus-services
  syncPolicy:
    automated:
      prune: true
      selfHeal: true